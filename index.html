<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Артём Косенко · Claude Code edition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1C1B18;
    --bg-chat: #141310;
    --bg-preview: #1C1B18;
    --panel: #211F1B;
    --panel-2: #2A2824;
    --border: #2E2B26;
    --border-strong: #3A3732;
    --text: #E8E4DB;
    --text-dim: #9B968A;
    --text-muted: #6B6761;
    --accent: #D97757;      /* Claude orange */
    --accent-2: #C25E3E;
    --green: #7EB47E;       /* tool success */
    --blue: #7BA3C4;        /* tool read */
    --yellow: #D3B26B;      /* tool edit */
    --red: #C0746F;
    --purple: #A48CC4;
    --ring: rgba(217, 119, 87, 0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Inter Tight", system-ui, sans-serif; overflow: hidden; }
  body { height: 100vh; }

  /* Window chrome */
  .win-chrome {
    height: 32px;
    background: #14120F;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px; gap: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; color: var(--text-muted);
    user-select: none;
  }
  .win-dots { display: flex; gap: 7px; }
  .win-dots span { width: 11px; height: 11px; border-radius: 50%; background: #4A4743; }
  .win-dots span:nth-child(1) { background: #E06C5E; }
  .win-dots span:nth-child(2) { background: #E0BB5E; }
  .win-dots span:nth-child(3) { background: #7EB47E; }
  .win-title { flex: 1; text-align: center; letter-spacing: 0.04em; }
  .win-title b { color: var(--text-dim); font-weight: 500; }
  .win-meta { display: flex; gap: 14px; align-items: center; }
  .win-meta span { opacity: 0.7; }
  .win-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: calc(100vh - 32px);
  }

  /* Chat pane */
  .chat {
    background: var(--bg-chat);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .chat-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .chat-header .orb {
    width: 10px; height: 10px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #8EE89E, var(--green));
    box-shadow: 0 0 10px var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px 120px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px;
    line-height: 1.55;
    scroll-behavior: smooth;
  }
  .chat-log::-webkit-scrollbar { width: 10px; }
  .chat-log::-webkit-scrollbar-track { background: transparent; }
  .chat-log::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid var(--bg-chat); }

  .msg { margin-bottom: 18px; opacity: 1; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg-user { color: var(--text); }
  .msg-user .prefix {
    color: var(--accent);
    margin-right: 8px; font-weight: 600;
  }

  .msg-assist { color: var(--text); }
  .msg-assist .prefix {
    color: var(--text-muted);
    margin-right: 8px;
  }
  .msg-assist .text { color: var(--text-dim); }

  /* Tool call block */
  .tool {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 10px;
    margin: 6px 0;
    font-size: 12px;
  }
  .tool-head {
    display: flex; align-items: center;
    gap: 8px;
    color: var(--text-dim);
  }
  .tool-head .tool-icon {
    font-size: 13px; min-width: 16px; text-align: center;
  }
  .tool-head .tool-name { color: var(--text); font-weight: 500; }
  .tool-head .tool-arg { color: var(--blue); margin-left: 2px; }
  .tool-head .tool-status {
    margin-left: auto;
    font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
  }
  .tool-head .tool-status.running { color: var(--yellow); }
  .tool-head .tool-status.done { color: var(--green); }
  .tool-head .tool-status .spin {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid currentColor; border-top-color: transparent;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-head .tool-status .check { font-size: 10px; }

  .tool-body {
    margin-top: 8px;
    padding-left: 24px;
    color: var(--text-muted);
    font-size: 11.5px;
    border-left: 2px solid var(--border-strong);
    margin-left: 8px;
    padding-top: 2px; padding-bottom: 2px;
  }
  .tool-body .line { opacity: 1; }
  .tool-body .diff-add { color: var(--green); }
  .tool-body .diff-del { color: var(--red); }
  .tool-body .k { color: var(--purple); }
  .tool-body .v { color: var(--yellow); }

  /* Composer (bottom) */
  .composer {
    padding: 12px 18px 16px;
    border-top: 1px solid var(--border);
    background: linear-gradient(to top, var(--bg-chat) 60%, rgba(20,19,16,0));
    font-family: "JetBrains Mono", monospace;
  }
  .composer .input-wrap {
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.2s;
  }
  .composer .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--ring);
  }
  .composer .prompt-mark { color: var(--accent); font-weight: 600; }
  .composer input {
    flex: 1; background: transparent; border: 0; outline: 0;
    color: var(--text); font: inherit; font-size: 12px;
  }
  .composer input::placeholder { color: var(--text-muted); }
  .composer .hint { font-size: 10.5px; color: var(--text-muted); margin-top: 8px; display: flex; gap: 14px; }
  .composer kbd {
    background: var(--panel-2); border: 1px solid var(--border-strong); border-bottom-width: 2px;
    padding: 1px 5px; border-radius: 4px;
    font-family: inherit; font-size: 10px; color: var(--text-dim);
  }

    .composer .input-wrap { cursor: default; }
  .composer input[readonly] { cursor: default; color: var(--text-muted); user-select: none; pointer-events: none; }
  .composer input[readonly]::placeholder { color: var(--text-muted); opacity: 0.75; }
  .composer .caret-blink {
    width: 7px; height: 13px; background: var(--accent); opacity: 0.8;
    display: inline-block;
    animation: caret 1s steps(2) infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }

  /* Quick nav */
  .quick-nav {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 6px 14px 10px;
    border-bottom: 1px solid var(--border);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    background: var(--bg-preview);
  }
  .qn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 9px;
    border-radius: 5px;
    cursor: pointer;
    font: inherit;
    transition: all 0.15s;
  }
  .qn:hover { color: var(--text); border-color: var(--border-strong); background: var(--panel); }
  .qn.is-active { color: var(--accent); border-color: var(--accent); background: rgba(224,107,60,0.08); }
  .qn[disabled] { opacity: 0.35; cursor: not-allowed; }

  /* Preview pane */
  .preview {
    background: var(--bg-preview);
    overflow-y: auto;
    position: relative;
  }
  .preview::-webkit-scrollbar { width: 10px; }
  .preview::-webkit-scrollbar-track { background: transparent; }
  .preview::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid var(--bg-preview); }

  .preview-head {
    position: sticky; top: 0; z-index: 10;
    background: rgba(28, 27, 24, 0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; color: var(--text-muted);
    display: flex; gap: 16px; align-items: center;
  }
  .preview-head .tabs { display: flex; gap: 2px; margin-right: auto; }
  .preview-head .tab {
    padding: 4px 10px; border-radius: 5px;
    color: var(--text-muted); cursor: default; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
  }
  .preview-head .tab.active { background: var(--panel); color: var(--text); }
  .preview-head .tab .close { opacity: 0.4; }
  .preview-head .meta { display: flex; gap: 14px; opacity: 0.6; }

  .doc {
    padding: 40px 56px 80px;
    max-width: 920px;
    margin: 0 auto;
  }

  /* Section reveal animation */
  .section { opacity: 1; transform: translateY(0); }
  .section.visible { opacity: 1; transform: translateY(0); }

  /* Hero */
  .hero-eyebrow {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }
  .hero-eyebrow .sep { flex: 1; height: 1px; background: linear-gradient(to right, var(--accent-2), transparent); opacity: 0.4; }
  .hero-title {
    font-family: "Inter Tight", sans-serif;
    font-size: 68px; line-height: 1.02;
    letter-spacing: -0.02em; font-weight: 400;
    margin: 0 0 18px;
  }
  .hero-title .ital { font-style: italic; color: var(--accent); }
  .hero-row {
    display: grid; grid-template-columns: 128px 1fr; gap: 28px;
    align-items: start;
    margin-top: 24px;
  }
  .hero-portrait {
    width: 148px; height: 180px; border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border-strong);
    background: var(--panel);
    position: relative;
  }
  .hero-portrait img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 18%; filter: saturate(0.8) contrast(1.05); }
  .hero-portrait::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(145deg, transparent 60%, rgba(28,27,24,0.35));
  }
  .hero-meta { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--text-dim); }
  .hero-meta .mrow { display: grid; grid-template-columns: 88px 1fr; gap: 14px; padding: 4px 0; }
  .hero-meta .mrow .k { color: var(--text-muted); }
  .hero-meta .mrow .v { color: var(--text); }
  .hero-meta .mrow .v.hi { color: var(--accent); }
  .hero-tagline {
    font-size: 17px; line-height: 1.55;
    color: var(--text-dim);
    max-width: 640px;
    margin: 18px 0 0;
  }

  /* Section label */
  .section-label {
    display: flex; align-items: baseline; gap: 12px;
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted);
    margin: 72px 0 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-label .num { color: var(--accent); }
  .section-label .chev { color: var(--text-muted); margin: 0 4px; }
  .section-label .caret { color: var(--accent); margin-left: 6px; animation: blink 1.1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* About */
  .about-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px; }
  .about p { margin: 0 0 14px; font-size: 15px; line-height: 1.6; color: var(--text-dim); }
  .metric-list { display: grid; gap: 10px; }
  .metric {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid; grid-template-columns: 1fr auto; align-items: center;
    gap: 12px;
    transition: border-color 0.15s, transform 0.15s;
  }
  .metric:hover { border-color: var(--accent); }
  .metric .ml { font-size: 11.5px; color: var(--text-muted); line-height: 1.4; letter-spacing: 0.03em; text-transform: uppercase; }
  .metric .mv { font-family: "JetBrains Mono", monospace; font-size: 22px; color: var(--accent); font-weight: 500; }

  /* Experience */
  .exp-head {
    display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 12px;
    margin-bottom: 4px;
  }
  .exp-head h3 {
    font-family: "Inter Tight", sans-serif; font-size: 22px; font-weight: 600;
    margin: 0; letter-spacing: -0.01em;
  }
  .exp-head .period { font-family: "JetBrains Mono", monospace; font-size: 11.5px; color: var(--text-muted); }
  .exp-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
  .exp-sub a { color: var(--accent); text-decoration: none; }
  .exp-blocks { display: grid; gap: 16px; }
  .exp-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
  }
  .exp-block h4 {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 12px;
    font-weight: 500;
  }
  .exp-block ul {
    list-style: none; margin: 0; padding: 0;
    display: grid; gap: 10px;
  }
  .exp-block li {
    font-size: 14px; line-height: 1.55; color: var(--text-dim);
    padding-left: 18px; position: relative;
  }
  .exp-block li::before {
    content: "▸"; position: absolute; left: 0; top: 0;
    color: var(--border-strong); font-family: "JetBrains Mono", monospace;
  }

  /* Cases */
  .cases-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .case {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    transition: border-color 0.15s, background 0.15s;
  }
  .case:hover { border-color: var(--accent); background: var(--panel-2); }
  .case .case-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; margin-bottom: 10px;
  }
  .case .case-name {
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px; color: var(--text); font-weight: 500;
    letter-spacing: 0.02em;
  }
  .case .case-tag {
    font-family: "JetBrains Mono", monospace; font-size: 10.5px;
    color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .case .case-stack { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .case-chip { font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: var(--text-dim); background: var(--panel-2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; }
  .case-desc { font-size: 13.5px; line-height: 1.5; color: var(--text-dim); }

  /* Talks */
  .talks { display: grid; gap: 10px; }
  .talk {
    display: grid; grid-template-columns: 64px 1fr auto;
    gap: 16px; align-items: baseline;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
  }
  .talk .date { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--accent); text-align: left; }
  .talk .title { font-size: 14px; color: var(--text); line-height: 1.4; }
  .talk .title .where { color: var(--text-muted); font-size: 12px; display: block; margin-top: 2px; }
  .talk .link { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-muted); }

  /* Skills */
  .skills { display: grid; gap: 2px; }
  .skill-row {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 20px; align-items: start;
    padding: 12px 0;
    border-bottom: 1px dashed var(--border);
  }
  .skill-row .sl {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;
    padding-top: 2px;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-tag {
    font-family: "JetBrains Mono", monospace; font-size: 11.5px;
    color: var(--text); background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 9px;
    transition: all 0.15s;
  }
  .skill-tag:hover { border-color: var(--accent); color: var(--accent); }

  /* Contact */
  .contact-card {
    background: linear-gradient(135deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    padding: 32px 36px;
    margin-top: 32px;
  }
  .contact-card h2 {
    font-family: "Inter Tight", sans-serif;
    font-size: 40px; font-weight: 400;
    margin: 0 0 4px; letter-spacing: -0.01em;
  }
  .contact-card h2 .ital { font-style: italic; color: var(--accent); }
  .contact-card .sub { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .contact-link {
    display: grid; grid-template-columns: 64px 1fr auto; gap: 14px;
    padding: 12px 14px;
    text-decoration: none; color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(0,0,0,0.15);
    font-family: "JetBrains Mono", monospace; font-size: 13px;
    transition: all 0.15s;
  }
  .contact-link:hover { border-color: var(--accent); color: var(--accent); transform: translateX(2px); }
  .contact-link .k { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; align-self: center; }
  .contact-link .arrow { color: var(--text-muted); }
  .contact-link:hover .arrow { color: var(--accent); }

  .footer-note {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    color: var(--text-muted);
    margin-top: 60px; padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-note .esc { opacity: 0.4; }
  .footer-note a { color: var(--text-muted); text-decoration: none; }
  .footer-note a:hover { color: var(--accent); }

  /* Mobile */
  @media (max-width: 900px) {
    html, body { overflow-x: hidden; overflow-y: auto; width: 100%; -webkit-overflow-scrolling: touch; }
    body { height: auto; min-height: 100vh; }
    .app { grid-template-columns: 1fr; height: auto; min-height: calc(100vh - 32px); }
    .chat { display: none; }
    .preview { overflow-y: visible; }
    .preview-head { padding: 8px 14px; gap: 8px; flex-wrap: wrap; }
    .preview-head .tabs { flex-wrap: wrap; }
    .preview-head .meta { display: none; }
    .quick-nav { padding: 6px 10px 8px; gap: 4px; font-size: 10.5px; }
    .qn { padding: 3px 7px; }
    .doc { padding: 24px 18px 60px; max-width: 100%; }

    .hero-title { font-size: 40px; line-height: 1.05; }
    .hero-row { grid-template-columns: 1fr; gap: 20px; }
    .hero-portrait { width: 124px; height: 150px; }
    .hero-meta .mrow { grid-template-columns: 72px 1fr; gap: 10px; font-size: 12.5px; }

    .about-grid { grid-template-columns: 1fr; gap: 20px; }
    .cases-grid { grid-template-columns: 1fr; }
    .contact-grid { grid-template-columns: 1fr; }
    .contact-link { grid-template-columns: 56px 1fr auto; gap: 10px; padding: 14px 14px; }
    .contact-link span:nth-child(2) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .contact-card { padding: 24px 20px; }
    .contact-card h2 { font-size: 36px; }
    .skill-row { grid-template-columns: 1fr; gap: 6px; }

    .talk { grid-template-columns: 1fr; gap: 6px; padding: 14px 16px; }
    .talk .date { order: 2; }
    .talk .link { display: none; }
    .exp-head, .exp-head2 { grid-template-columns: 1fr !important; gap: 6px !important; }
    .case-card { padding: 16px !important; }
    .section { margin-bottom: 48px; }
    .win-chrome { padding: 0 10px; gap: 10px; }
    .win-title { font-size: 10px; }
  }

  @media (max-width: 480px) {
    .hero-title { font-size: 32px; }
    .contact-card h2 { font-size: 28px; }
    .doc { padding: 20px 14px 50px; }
    .contact-link { font-size: 13px; }
    .win-title { display: none; }
  }
</style>

        <section class="section" id="s-contact">

            <h2>Давайте <span class="ital">поговорим</span></h2>

              <a class="contact-link" href="${c.telegramHref}" target="_blank" rel="noopener"><span class="k">telegram</span><span>${c.telegram}</span><span class="arrow">↗</span></a>
              <a class="contact-link" href="mailto:${c.email}?subject=CV"><span class="k">cv.pdf</span><span>download</span><span class="arrow">↓</span></a>

// ============ DRIVER ============
const chatLog = document.getElementById('chatLog');
const doc = document.getElementById('doc');

// Pre-create all sections (hidden) so scrolling works smoothly
const ORDER = ['hero','about','experience','cases','talks','skills','contact'];
ORDER.forEach(k => { doc.insertAdjacentHTML('beforeend', renderSection(k)); });

let stickToBottom = true;
function isAtBottom(el, thr = 24) {
  return el.scrollHeight - el.clientHeight - el.scrollTop < thr;
}
(function bindChatScroll() {
  // Unstick when user scrolls up; re-stick when they scroll back to bottom
  let lastTop = 0;
  const onScroll = () => {
    if (!chatLog) return;
    if (isAtBottom(chatLog)) stickToBottom = true;
    else if (chatLog.scrollTop < lastTop) stickToBottom = false;
    lastTop = chatLog.scrollTop;
  };
  // Chat element may not exist yet at script-parse time; attach on DOMContentLoaded
  document.addEventListener('DOMContentLoaded', () => {
    if (chatLog) chatLog.addEventListener('scroll', onScroll, { passive: true });
  });
  // Also user input (wheel/touch) always unsticks if it moves away from bottom
  window.addEventListener('wheel', (e) => {
    if (!chatLog) return;
    if (!chatLog.contains(e.target)) return;
    if (e.deltaY < 0) stickToBottom = false;
    else if (isAtBottom(chatLog)) stickToBottom = true;
  }, { passive: true });
  window.addEventListener('touchmove', () => {
    if (chatLog && !isAtBottom(chatLog)) stickToBottom = false;
  }, { passive: true });
})();

function addMessage(html) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = html;
  chatLog.appendChild(div);
  if (stickToBottom) chatLog.scrollTop = chatLog.scrollHeight;
  return div;
}

function revealSection(key) {
  const el = document.getElementById('s-' + key);
  if (!el) return;
  el.classList.add('visible');
  // auto-scroll disabled — user controls scroll position
}

function toolIconHtml(icon) {
  return `<span class="tool-icon">${icon}</span>`;
}

async function runScript() {
  for (const step of SCRIPT) {
    await sleep(step.delay);

    if (step.type === 'user') {
      addMessage(`<div class="msg-user"><span class="prefix">artyom@</span>${step.text}</div>`);
    } else if (step.type === 'assist') {
      addMessage(`<div class="msg-assist"><span class="prefix">▸</span><span class="text">${step.text}</span></div>`);
    } else if (step.type === 'tool') {
      const msg = addMessage(`
        <div class="tool">
          <div class="tool-head">
            ${toolIconHtml(step.icon)}
            <span class="tool-name">${step.tool}</span>
            <span class="tool-arg">${step.arg}</span>
            <span class="tool-status running"><span class="spin"></span>running</span>
          </div>
          <div class="tool-body"></div>
        </div>`);
      const body = msg.querySelector('.tool-body');
      const status = msg.querySelector('.tool-status');

      // Stream body lines during duration
      await sleep(Math.min(350, step.duration * 0.25));
      const lineDelay = Math.max(40, (step.duration * 0.65) / Math.max(1, step.body.length));
      for (const line of step.body) {
        const l = document.createElement('div');
        l.className = 'line' + (line.cls ? ' ' + line.cls : '');
        l.textContent = line.t;
        body.appendChild(l);
        if (stickToBottom) chatLog.scrollTop = chatLog.scrollHeight;
        await sleep(lineDelay);
      }
      await sleep(step.duration * 0.10);
      status.className = 'tool-status done';
      status.innerHTML = '<span class="check">✓</span>done';

      if (step.reveal) {
        await sleep(250);
        revealSection(step.reveal);
      }
    }
  }

  // after sequence — input remains disabled (display-only chat)
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }



// Quick-nav behaviour
function initQuickNav() {
  const preview = document.getElementById('preview');
  const btns = [...document.querySelectorAll('.qn')];
  // initial: all disabled
  btns.forEach(b => b.disabled = true);

  btns.forEach(b => {
    b.addEventListener('click', () => {
      const el = document.getElementById(b.dataset.target);
      if (!el || b.disabled) return;
      const rect = el.getBoundingClientRect();
      const top = rect.top + preview.scrollTop - preview.getBoundingClientRect().top - 24;
      preview.scrollTo({ top: Math.max(0, top), behavior: 'auto' });
    });
  });

  // Observe reveals to enable
  const mo = new MutationObserver(() => {
    btns.forEach(b => {
      const el = document.getElementById(b.dataset.target);
      if (el && el.classList.contains('visible')) b.disabled = false;
    });
  });
  mo.observe(document.getElementById('doc'), { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });

  // Scrollspy
  preview.addEventListener('scroll', () => {
    let active = null;
    btns.forEach(b => {
      const el = document.getElementById(b.dataset.target);
      if (!el) return;
      const r = el.getBoundingClientRect();
      const pr = preview.getBoundingClientRect();
      if (r.top - pr.top <= 80) active = b;
    });
    btns.forEach(b => b.classList.toggle('is-active', b === active));
  });
}

// Kick off
window.addEventListener('DOMContentLoaded', () => { initQuickNav(); runScript(); });
</script>
